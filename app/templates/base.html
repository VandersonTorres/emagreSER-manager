<!DOCTYPE html>
<html lang="pt-br">

<head>
    {% block head %}{% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmagreSER</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive-logo.css') }}">
</head>

<body>
    <div class="container shadow-sm rounded my-3 overflow-hidden p-0">
        <header class="py-3 text-white" style="background: linear-gradient(135deg, #08801644, #305a3d);">
            <div class="row align-items-center justify-content-center text-center text-lg-start logo-title">
                <div class="col-12 col-md-6 mb-3 mb-md-0 d-flex justify-content-center justify-content-center">
                    <img src="{{ url_for('static', filename='img/logo2.png') }}" alt="Logo EmagreSER"
                        class="logo img-fluid main-logo">
                </div>
            </div>

            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-dark">
                <div class="container-fluid justify-content-center">
                    <a class="navbar-brand fw-bold" href="/">🏠 Início</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse justify-content-md-end" id="navbarContent">
                        <ul class="navbar-nav">
                            {% if current_user.is_authenticated %}
                            <li class="nav-item"><a class="nav-link"
                                    href="{{ url_for('specialists.list_specialists') }}">Profissionais</a></li>
                            <li class="nav-item"><a class="nav-link"
                                    href="{{ url_for('patients.list_patients') }}">Pacientes</a></li>
                            <li class="nav-item"><a class="nav-link" href="{{ url_for('diets.list_diets') }}">Dietas</a>
                            </li>
                            <li class="nav-item"><a class="nav-link"
                                    href="{{ url_for('schedules.list_schedules') }}">Agendamentos</a></li>
                            <li class="nav-item"><a class="nav-link"
                                    href="{{ url_for('schedules.schedule_action') }}">Agendar
                                    Consulta</a></li>
                            {% endif %}
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="main-content container mt-4 mb-5 p-4 rounded shadow-sm bg-white">
            {% block content %}{% endblock %}
        </main>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
    </div>
</body>

</html>
