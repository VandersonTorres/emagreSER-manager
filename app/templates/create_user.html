{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/create-user.css') }}">

<div class="container mt-4 mb-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white text-center fw-bold fs-5">
            🧾 Cadastramento de Usuários no Sistema
        </div>

        <div class="card-body">
            <form class="create-user-form" method="POST" action="{{ url_for('admin.create_user') }}">
                <!-- Dados básicos -->
                <div class="mb-4">
                    <h5 class="text-success mb-3 fw-semibold">🧍 Dados do Usuário</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-semibold">Nome:</label>
                            <input type="text" name="name" id="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-semibold">Email:</label>
                            <input type="text" name="email" id="email" class="form-control" required>
                        </div>
                    </div>
                </div>

                <hr>

                <!-- Senha -->
                <div class="mb-4">
                    <h5 class="text-success mb-3 fw-semibold">🔒 Definição de Senha</h5>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Senha:</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>

                    <div class="bg-light border rounded p-3">
                        <h6 class="fw-semibold text-muted">A senha deve conter:</h6>
                        <ul class="list-unstyled ms-3 text-secondary small">
                            <li>• Pelo menos 6 caracteres</li>
                            <li>• Um caractere maiúsculo</li>
                            <li>• Um caractere minúsculo</li>
                            <li>• Um símbolo</li>
                        </ul>
                    </div>
                </div>

                <hr>

                <!-- Função -->
                <div class="mb-4">
                    <h5 class="text-success mb-3 fw-semibold">👔 Função do Usuário</h5>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="role" id="admin" value="admin" required>
                        <label class="form-check-label" for="admin">Gestor</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="role" id="secretary" value="secretary"
                            required>
                        <label class="form-check-label" for="secretary">Secretária</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="role" id="nutritionist" value="nutritionist"
                            required>
                        <label class="form-check-label" for="nutritionist">Nutricionista</label>
                    </div>
                </div>

                <!-- Botão -->
                <div class="text-center">
                    <button type="submit" class="btn btn-success px-5 py-2 fw-semibold shadow-sm">
                        Cadastrar Usuário
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/validate_register.js') }}"></script>

{% endblock %}
